<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title data-i18n="login.title">登录界面</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            display: flex;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .form-section {
            padding: 40px;
            width: 360px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .form-section h2 {
            margin: 0 0 8px 0;
            color: #1f2937;
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: none;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            color: #374151;
            background-color: #f9fafb;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-group button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-login {
            background: #3b82f6;
            color: white;
        }

        .btn-login:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-login:disabled {
            background: #93c5fd;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-forgot {
            background: #ffffff;
            color: #4b5563;
            border: 1px solid #d1d5db !important;
        }

        .btn-forgot:hover {
            border-color: #3b82f6 !important;
            color: #3b82f6;
        }

        .tips {
            position: fixed;
            top: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 1000;
        }

        #tipsDiv {
            display: none;
            background: #ffffff;
            padding: 14px 28px;
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            border-left: 4px solid #3b82f6;
            pointer-events: auto;
            max-width: 480px;
        }

        #tipsDiv p {
            margin: 0;
            color: #1f2937;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.6;
        }

        .lang-switch {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 0;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .lang-switch button {
            padding: 4px 10px;
            font-size: 12px;
            border: none;
            background: #f9fafb;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }

        .lang-switch button.active {
            background: #3b82f6;
            color: #fff;
        }

        .lang-switch button:hover:not(.active) {
            background: #f3f4f6;
            color: #3b82f6;
        }

        body.i18n-loading .login-container {
            visibility: hidden;
        }
    </style>
</head>
<body class="i18n-loading">

<div class="login-container">
    <div class="lang-switch">
        <button id="langBtn_zh" onclick="switchLang('zh')">中文</button>
        <button id="langBtn_en" onclick="switchLang('en')">EN</button>
    </div>
    <div class="form-section">
        <h2 data-i18n="login.welcome">欢迎回来</h2>
        <div class="subtitle" data-i18n="login.subtitle">请登录您的账号继续</div>

        <div class="input-group">
            <label data-i18n="login.username_label" for="username">用户名</label>
            <input autocomplete="username" data-i18n-placeholder="login.username_placeholder" id="username"
                   placeholder="请输入用户名" type="text">
        </div>
        <div class="input-group">
            <label data-i18n="login.password_label" for="password">密码</label>
            <input autocomplete="current-password" data-i18n-placeholder="login.password_placeholder" id="password"
                   placeholder="请输入密码" type="password">
        </div>

        <div class="btn-group">
            <button class="btn-login" data-i18n="login.btn_login" id="loginBtn" onclick="login()">登录</button>
            <button class="btn-forgot" data-i18n="login.btn_forgot" onclick="forgotPassword()">忘记密码</button>
        </div>
    </div>
</div>

<div class="tips">
    <div id="tipsDiv">
        <p id="tipsTitle"></p>
    </div>
</div>

<script>
    const langData = {};
    let currentLang = 'zh';

    function langFileName(lang) {
        return lang === 'en' ? 'en_us.json' : lang + '_cn.json';
    }

    function loadLang(lang) {
        return fetch('/lang/' + langFileName(lang))
            .then(r => {
                if (!r.ok) throw new Error();
                return r.json();
            })
            .then(data => {
                langData[lang] = data;
            })
            .catch(() => {
                if (lang !== 'en') {
                    return fetch('/lang/en_us.json').then(r => r.json()).then(data => {
                        langData[lang] = data;
                    });
                }
            });
    }

    function t(key) {
        return (langData[currentLang] && langData[currentLang][key]) || (langData['en'] && langData['en'][key]) || key;
    }

    function updateLanguage(lang) {
        currentLang = lang;
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en-US';

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            const val = t(key);
            if (val !== key) {
                if (el.tagName === 'TITLE') {
                    document.title = val;
                } else {
                    el.textContent = val;
                }
            }
        });

        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            const val = t(key);
            if (val !== key) el.placeholder = val;
        });

        document.getElementById('langBtn_zh').classList.toggle('active', lang === 'zh');
        document.getElementById('langBtn_en').classList.toggle('active', lang === 'en');
        document.body.classList.remove('i18n-loading');
    }

    function switchLang(lang) {
        localStorage.setItem('user_lang', lang);
        updateLanguage(lang);
    }

    (function initI18n() {
        const saved = localStorage.getItem('user_lang');
        const browserLang = (navigator.language || '').toLowerCase();
        const lang = saved || (browserLang.startsWith('zh') ? 'zh' : 'en');

        const promises = [loadLang('zh'), loadLang('en')];
        Promise.all(promises).then(() => {
            updateLanguage(lang);
        });
    })();

    document.getElementById('password').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') login();
    });
    document.getElementById('username').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('password').focus();
    });

    function login() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');

        if (!user || !pass) {
            showTips(t('login.alert_empty'), 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = t('login.btn_logging');

        const params = new URLSearchParams();
        params.append('user', user);
        params.append('password', pass);

        fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: params.toString()
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    showTips(t('login.alert_success'), 'info');
                    setTimeout(() => {
                        window.location.href = data.adminPath || '/admin.html';
                    }, 600);
                } else {
                    showTips(data.message || t('login.alert_wrong'), 'error');
                }
            })
            .catch(() => {
                showTips(t('login.alert_network'), 'error');
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = t('login.btn_login');
            });
    }

    function forgotPassword() {
        showTips(t('login.forgot_msg'), 'info');
    }

    let tipsTimer = null;

    function showTips(msg, type) {
        const div = document.getElementById('tipsDiv');
        const title = document.getElementById('tipsTitle');
        div.className = type || 'info';
        title.textContent = msg;
        div.style.display = 'block';
        if (tipsTimer) clearTimeout(tipsTimer);
        tipsTimer = setTimeout(() => {
            div.style.display = 'none';
        }, 5000);
    }
</script>
</body>
</html>
